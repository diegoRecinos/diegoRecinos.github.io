<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Camera Feed Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        video {
            width: 640px;
            height: 360px;
            background-color: #333;
        }
    </style>
</head>
<body>
    <h1>Live Public Camera Feed: Times Square</h1>
    <video id="video" controls></video>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        if (Hls.isSupported()) {
            var video = document.getElementById('video');
            var hls = new Hls();
            hls.loadSource('https://cdn.skylinewebcams.com/live.m3u8?a=5ktc94hf6li4');
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = 'https://cdn.skylinewebcams.com/live.m3u8?a=5ktc94hf6li4';
        }
    </script>
</body>
</html>
