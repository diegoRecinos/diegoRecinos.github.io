<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }
        h1 {
            color: #333;
        }
        .video-container {
            margin: auto;
            width: 640px;
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Live ISS Camera Feed</h1>
    <div class="video-container">
        <video controls autoplay>
            <source src="https://live-video01-cdn.nasa.gov/space/iss_stream/index.m3u8" type="application/x-mpegURL">
            Your browser does not support the video tag.
        </video>
    </div>

</body>
</html>
